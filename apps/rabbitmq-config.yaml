apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexo-raiden-rabbitmq-config
  namespace: argocd
spec:
  project: nexo-raiden-platform
  source:
    repoURL: https://github.com/nexoraiden/homelab-gitops.git
    targetRevision: main
    path: infrastructure/messaging/rabbitmq
  destination:
    server: https://kubernetes.default.svc
    namespace: messaging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
