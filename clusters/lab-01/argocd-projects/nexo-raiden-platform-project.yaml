apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: nexo-raiden-platform
  namespace: argocd
spec:
  description: NEXO-RAIDEN platform workloads

  sourceRepos:
    - https://github.com/nexoraiden/homelab-gitops.git
    - https://kubernetes.github.io/ingress-nginx
    - https://helm.releases.hashicorp.com
    - https://charts.external-secrets.io

  destinations:
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: security
      server: https://kubernetes.default.svc
    - namespace: platform
      server: https://kubernetes.default.svc
    - namespace: storage
      server: https://kubernetes.default.svc
    - namespace: data
      server: https://kubernetes.default.svc
    - namespace: ai
      server: https://kubernetes.default.svc
    - namespace: applications
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: "*"
      kind: "*"    

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
