apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexo-raiden-keycloak
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexo-raiden-keycloak
  template:
    metadata:
      labels:
        app: nexo-raiden-keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.0.7
          args:
            - start-dev
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://nexo-raiden-postgresql.data.svc.cluster.local:5432/nexo_platform
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: nexo-raiden-keycloak-secret
                  key: KC_DB_USERNAME
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexo-raiden-keycloak-secret
                  key: KC_DB_PASSWORD
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: nexo-raiden-keycloak-secret
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexo-raiden-keycloak-secret
                  key: KEYCLOAK_ADMIN_PASSWORD
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
