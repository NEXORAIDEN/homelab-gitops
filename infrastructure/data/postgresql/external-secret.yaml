apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nexo-raiden-postgresql-secret
  namespace: data
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: nexo-raiden-vault
    kind: ClusterSecretStore
  target:
    name: nexo-raiden-postgresql-secret
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_DB
      remoteRef:
        key: data/postgresql
        property: POSTGRES_DB
    - secretKey: POSTGRES_USER
      remoteRef:
        key: data/postgresql
        property: POSTGRES_USER
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: data/postgresql
        property: POSTGRES_PASSWORD
